<body>
    <script>
       // 6️⃣ Salary Report Generator
// Concept: reduce()

let salaries = [10000,20000,30000,40000]

// Total salary
let total = salaries.reduce((sum,sal)=>sum+sal,0);
console.log(total);

// Average salary
let avg = total / salaries.length;
console.log(avg);
    </script>
