<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let time = 10;

let countdown = setInterval(() => {
    console.log(time);
    time--;

    if (time < 0) {
        clearInterval(countdown);
        console.log("Meeting Started");
    }
}, 1000);
    </script>
</body>
</html>
