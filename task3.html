    <script>
      // 3️⃣ Website Username Formatter
// Concepts: trim(), toUpperCase(), toLowerCase(), slice()

let username = "   naveenkumar   "

// Remove spaces
let clean = username.trim();
console.log(clean);

// Uppercase
console.log(clean.toUpperCase());

// Lowercase
console.log(clean.toLowerCase());

// First 6 characters
console.log(clean.slice(0,6));

    </script>
