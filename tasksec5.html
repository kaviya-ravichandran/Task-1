<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 1
        console.log("logical operator")
        console.log(true && false)
        // outpit false
        // 2
        console.log(true || false)
        // output true
        // 3
        console.log(false || false)
        // output false
        // 4
        console.log(!true)
        // output false
        // 5
        console.log(!(5 > 2))
        // output false
        // 6
        console.log(5 > 3 && 10 > 5)
        // output true
        // 7
        console.log(5 > 3 && 10 < 5)
        // output false
        // 8
        console.log(5 < 3 || 10 < 5)
        // output false
        // 9
        console.log(5 < 3 || 10 > 5)
        // output true
        // 10
        console.log((5 > 2 && 3 > 1) || (10 < 2))
        // output true
    </script>
    
</body>
</html>
