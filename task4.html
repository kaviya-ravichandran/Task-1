<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // SECTION 4 – For Loop
// 1. Print 1–10
for (let i = 1; i <= 10; i++) {
    console.log(i);
}
// 2. Print 10–1
for (let i = 10; i >= 1; i--) {
    console.log(i);
}
// 3. Even Numbers
for (let i = 1; i <= 20; i++) {
    if (i % 2 === 0) {
        console.log(i);
    }
}
// 4. Odd Numbers
for (let i = 1; i <= 20; i++) {
    if (i % 2 !== 0) {
        console.log(i);
    }
}
// 5. Table of 5
for (let i = 1; i <= 10; i++) {
    console.log("5 x " + i + " = " + (5*i));
}
    </script>
</body>
</html>
