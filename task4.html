<!DOCTYPE html>
<html lang="en">

<body>
    <script>
       // 4️⃣ Game Platform Data Processing
// Concepts: forEach(), map()

let games = ["cricket","football","hockey","tennis"]

// Print using forEach
games.forEach(game => {
    console.log(game);
});

// Create new array
let newGames = games.map(game => "Game : " + game);
console.log(newGames);
    </script>
</body>
</html>
