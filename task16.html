<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
       // SECTION 8 – For In (Object)
// 1. Print values
let student = {
    name: "John",
    age: 21,
    department: "Computer Science"
};

for (let key in student) {
    console.log(student[key]);
}
// 2. Print keys
for (let key in student) {
    console.log(key);
}
// 3. Print key and value
for (let key in student) {
    console.log(key + ": " + student[key]);
}
// SECTION 9 – Functions
// 1. Addition Function
function add(a, b) {
    return a + b;
}

console.log(add(5,3));
// 2. Square Function
function square(num) {
    return num * num;
}

console.log(square(4));
    </script>
</body>
</html>
