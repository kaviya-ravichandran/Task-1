<body>
    <script>
       // 5️⃣ Student Marks Analyzer
// Concepts: sort(), reverse()

let marks = [45,90,23,67,88,12]

// Ascending
let asc = [...marks].sort((a,b)=>a-b);
console.log(asc);

// Descending
let desc = [...marks].sort((a,b)=>b-a);
console.log(desc);

// Reverse
console.log([...marks].reverse());
    </script>
</body>
