<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
       // 1️⃣ Employee Salary Analysis System
// Concepts: filter(), find(), reduce(), some(), every()

let employees = [
 {name:"Ravi", salary:25000},
 {name:"Meena", salary:60000},
 {name:"Arun", salary:45000},
 {name:"Priya", salary:80000},
 {name:"John", salary:30000}
]

// Employees salary > 40000
let highSalary = employees.filter(emp => emp.salary > 40000);
console.log(highSalary);

// First employee salary > 70000
let firstHigh = employees.find(emp => emp.salary > 70000);
console.log(firstHigh);

// Total salary
let totalSalary = employees.reduce((sum, emp) => sum + emp.salary, 0);
console.log(totalSalary);

// Any employee salary < 20000
let lowSalary = employees.some(emp => emp.salary < 20000);
console.log(lowSalary);

// All employees salary > 20000
let allAbove = employees.every(emp => emp.salary > 20000);
console.log(allAbove);
    </script>
</body>
</html>
