<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Section 2
       // 1. Grade System
let marks = 85;

if (marks >= 90) {
    console.log("Grade A");
} else if (marks >= 70) {
    console.log("Grade B");
} else if (marks >= 50) {
    console.log("Grade C");
} else {
    console.log("Fail");
}
// 2. Hour Message
let hour = 14;

if (hour < 12) {
    console.log("Morning");
} else if (hour < 17) {
    console.log("Afternoon");
} else if (hour < 20) {
    console.log("Evening");
} else {
    console.log("Night");
}
// 3. Number Check
let num = 0;

if (num === 0) {
    console.log("Zero");
} else if (num > 0) {
    console.log("Positive");
} else {
    console.log("Negative");
}
// 4. Score Result
let score = 75;

if (score >= 100) {
    console.log("Winner");
} else if (score >= 50) {
    console.log("Good");
} else {
    console.log("Try again");
}
// 5. Largest of 3 Numbers
let a = 10, b = 25, c = 15;

if (a > b && a > c) {
    console.log("A is largest");
} else if (b > a && b > c) {
    console.log("B is largest");
} else {
    console.log("C is largest");
}
    </script>
</body>
</html>
