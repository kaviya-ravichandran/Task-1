<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        console.log("Hello" + "World") // HelloWorld
        let first = "John"
        let last = "Doe"
        console.log(first + " " + last) // John Doe
        console.log(`${first} ${last}`) // John Doe
        console.log("10" + 5) // 105
        console.log(5 + "10") // 510
    </script>
</body>
</html>
