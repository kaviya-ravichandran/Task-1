<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        fetch("https://jsonplaceholder.typicode.com/todos/")
.then(response => response.json())
.then(data => {

})
.catch(error => {

})
.finally(() => {
    console.log("Process Completed");
});
    </script>
</body>
</html>
