       // 8️⃣ Job Role Modifier
// Concepts: replace(), startsWith(), endsWith()

let role = "python developer"

// Replace python with javascript
console.log(role.replace("python","javascript"));

// Starts with python

// Ends with developer
console.log(role.endsWith("developer"));
